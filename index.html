<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#080b18">
  <meta name="description" content="A small creative studio turning thoughtful ideas into memorable digital experiences.">
  <title>Lumina — Digital experiences with a human pulse</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="orb orb-one" aria-hidden="true"></div>
  <div class="orb orb-two" aria-hidden="true"></div>

  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Lumina home">
      <span class="brand-mark" aria-hidden="true">L</span>
      <span>Lumina</span>
    </a>
    <nav aria-label="Main navigation">
      <a class="active" href="index.html" aria-current="page">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>

  <main class="home-main">
    <section class="hero glass">

      <h1>Ideas, made <span>luminous.</span></h1>
      <p class="hero-copy">

        <a class="button button-primary" href="contact.html">
          Start a conversation <span aria-hidden="true">↗</span>
        </a>
        <a class="button button-quiet" href="about.html">
          Meet the studio <span aria-hidden="true">→</span>
        </a>
      </div>
      <div class="hero-meta" aria-label="Studio principles">
        <span>Strategy</span>
        <span>Design</span>
        <span>Development</span>
      </div>

  <footer class="site-footer">
    <span>© <span data-year></span> Lumina Studio</span>
