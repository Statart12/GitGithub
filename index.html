<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#080b18">
  <title>Hello, World!</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #080b18;
      color: #f8f9ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 15% 20%, rgba(111, 72, 255, 0.28), transparent 32rem),
        radial-gradient(circle at 85% 75%, rgba(0, 229, 255, 0.20), transparent 30rem),
        #080b18;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.42;
      background-image: radial-gradient(rgba(255, 255, 255, 0.65) 0.7px, transparent 0.7px);
      background-size: 28px 28px;
      mask-image: linear-gradient(to bottom, black, transparent 85%);
    }

    .orb {
      position: fixed;
      width: 26rem;
      aspect-ratio: 1;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }

    .orb.one {
      top: -12rem;
      left: -9rem;
      background: #865dff;
    }

    .orb.two {
      right: -10rem;
      bottom: -13rem;
      background: #00d4ff;
      animation-delay: -5s;
    }

    main {
      position: relative;
      width: min(90%, 760px);
      padding: clamp(2.5rem, 8vw, 5.5rem);
      text-align: center;
      isolation: isolate;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 32px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.035));
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.38),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(24px);
      animation: arrive 900ms cubic-bezier(.2, .8, .2, 1) both;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      margin: 0 0 1.4rem;
      padding: 0.5rem 0.9rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      color: #cbd2ff;
      background: rgba(255, 255, 255, 0.06);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 0.55rem;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #64f4cf;
      box-shadow: 0 0 14px #64f4cf;
      animation: pulse 2s ease-in-out infinite;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.7rem, 12vw, 8.2rem);
      line-height: 0.9;
      letter-spacing: -0.075em;
      background: linear-gradient(115deg, #ffffff 18%, #b5bfff 45%, #70f0ff 78%, #ffffff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shine 6s linear infinite;
    }

    p {
      max-width: 34rem;
      margin: 1.7rem auto 0;
      color: #b9c0d9;
      font-size: clamp(1rem, 2.5vw, 1.18rem);
      line-height: 1.7;
    }

    .sparkle {
      display: inline-block;
      color: #9cf5ff;
      animation: twinkle 1.8s ease-in-out infinite;
    }

    footer {
      position: fixed;
      bottom: 1.4rem;
      color: rgba(255, 255, 255, 0.42);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
    }

    @keyframes arrive {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes shine {
      to { background-position: 200% center; }
    }

    @keyframes pulse {
      50% { opacity: 0.45; transform: scale(0.72); }
    }

    @keyframes twinkle {
      50% { transform: rotate(18deg) scale(1.35); text-shadow: 0 0 14px #70f0ff; }
    }

    @keyframes drift {
      to { transform: translate(5rem, 3rem) scale(1.1); }
    }

    @media (max-width: 520px) {
      main { border-radius: 24px; }
      h1 { line-height: 0.96; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <div class="orb one" aria-hidden="true"></div>
  <div class="orb two" aria-hidden="true"></div>

  <main>
    <div class="eyebrow">Your first web page</div>
    <h1>Hello,<br>world!</h1>
    <p>
      A tiny page with a little extra magic.
      Welcome to the web <span class="sparkle" aria-hidden="true">✦</span>
    </p>
  </main>

  <footer>MADE WITH HTML + CSS</footer>
</body>
</html>
